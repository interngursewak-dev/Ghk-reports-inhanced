<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHK Reports — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --green:#2c6e49; --yellow:#f7b500; --navy:#2a3b8f; --terracotta:#a54f2e;
    --bg:#f4f6f5; --card:#ffffff; --text:#1f2a24; --muted:#637067; --border:#e1e6e3;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--green);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  header h1{margin:0;font-size:20px;font-weight:600;}
  header .badge{background:var(--yellow);color:#3a2900;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .container{max-width:1200px;margin:0 auto;padding:24px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;background:var(--card);padding:16px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px;}
  .controls label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
  select,input[type=date]{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;min-width:160px;}
  button{background:var(--navy);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;}
  button.secondary{background:var(--terracotta);}
  button:hover{opacity:.9;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tab-btn{background:var(--card);border:1px solid var(--border);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);}
  .tab-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .kpi-card .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .kpi-card .value{font-size:26px;font-weight:700;color:var(--navy);}
  .kpi-card .sub{font-size:12px;margin-top:4px;}
  .sub.up{color:var(--green);} .sub.down{color:var(--terracotta);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:800px){.grid2{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px;}
  .card h3{margin-top:0;font-size:15px;color:var(--navy);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;}
  .loading,.empty{padding:40px;text-align:center;color:var(--muted);}
  .compare-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:800px){.compare-cols{grid-template-columns:1fr;}}
  .period-label{font-weight:700;color:#fff;padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;font-size:12px;}
  .p1{background:var(--navy);} .p2{background:var(--terracotta);}
</style>
</head>
<body>

<header>
  <h1>📊 GHK Reports — Live Dashboard</h1>
  <span class="badge" id="lastUpdated">Loading…</span>
</header>

<div class="container">

  <div class="controls">
    <div>
      <label>School</label>
      <select id="schoolSelect"></select>
    </div>
    <div>
      <label>Report</label>
      <select id="reportSelect"></select>
    </div>
    <div>
      <label>From</label>
      <input type="date" id="fromDate">
    </div>
    <div>
      <label>To</label>
      <input type="date" id="toDate">
    </div>
    <div style="align-self:end;">
      <button onclick="loadDashboard()">🔄 Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</div>
    <div class="tab-btn" data-tab="compare" onclick="switchTab('compare')">Compare Periods</div>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="tab-dashboard">
    <div id="kpiGrid" class="kpi-grid"></div>
    <div class="grid2">
      <div class="card">
        <h3>Trend (row count by date)</h3>
        <canvas id="trendChart" height="220"></canvas>
      </div>
      <div class="card">
        <h3 id="catChartTitle">Category breakdown</h3>
        <canvas id="catChart" height="220"></canvas>
      </div>
    </div>
    <div class="card">
      <h3>Raw data preview (latest 25 rows in range)</h3>
      <div style="overflow-x:auto;">
        <table id="dataTable"></table>
      </div>
    </div>
  </div>

  <!-- COMPARE TAB -->
  <div id="tab-compare" style="display:none;">
    <div class="controls">
      <div>
        <label>Period 1: From</label>
        <input type="date" id="p1From">
      </div>
      <div>
        <label>Period 1: To</label>
        <input type="date" id="p1To">
      </div>
      <div>
        <label>Period 2: From</label>
        <input type="date" id="p2From">
      </div>
      <div>
        <label>Period 2: To</label>
        <input type="date" id="p2To">
      </div>
      <div style="align-self:end;">
        <button class="secondary" onclick="loadComparison()">⚖️ Compare</button>
      </div>
    </div>
    <div id="compareKpis" class="kpi-grid"></div>
    <div class="card">
      <h3>Trend comparison</h3>
      <canvas id="compareTrendChart" height="240"></canvas>
    </div>
    <div class="compare-cols">
      <div class="card">
        <span class="period-label p1">Period 1</span>
        <div id="p1Categories"></div>
      </div>
      <div class="card">
        <span class="period-label p2">Period 2</span>
        <div id="p2Categories"></div>
      </div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   CONFIG — paste your Apps Script Web App /exec URL below
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbxMSY5FpGD-3uRLCvgNWly-FIwFk0rWRgI1m-XULNinLvf0DfijZxaM_z_dYab85wA/exec';

let INDEX = [];
let trendChart, catChart, compareTrendChart;
const COLORS = ['#2c6e49','#f7b500','#2a3b8f','#a54f2e','#6aa84f','#cc7722'];

async function api(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function init() {
  const idx = await api({ action: 'list' });
  INDEX = idx.items;
  const schools = [...new Set(INDEX.map(i => i.school))];
  const schoolSelect = document.getElementById('schoolSelect');
  schoolSelect.innerHTML = schools.map(s => `<option value="${s}">${s}</option>`).join('');
  schoolSelect.onchange = populateReports;
  populateReports();
  document.getElementById('lastUpdated').textContent = 'Live • ' + new Date().toLocaleTimeString();
  setDefaultDates();
  loadDashboard();
}

function populateReports() {
  const school = document.getElementById('schoolSelect').value;
  const reports = INDEX.filter(i => i.school === school);
  const reportSelect = document.getElementById('reportSelect');
  reportSelect.innerHTML = reports.map(r => `<option value="${r.id}|||${r.sheet}">${r.sheet}</option>`).join('');
}

function setDefaultDates() {
  const today = new Date();
  const past = new Date(); past.setDate(today.getDate() - 30);
  document.getElementById('fromDate').value = past.toISOString().slice(0,10);
  document.getElementById('toDate').value = today.toISOString().slice(0,10);
  document.getElementById('p1From').value = past.toISOString().slice(0,10);
  document.getElementById('p1To').value = today.toISOString().slice(0,10);
  const prevPast = new Date(past); prevPast.setDate(past.getDate() - 30);
  document.getElementById('p2From').value = prevPast.toISOString().slice(0,10);
  document.getElementById('p2To').value = past.toISOString().slice(0,10);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
  document.getElementById('tab-compare').style.display = tab === 'compare' ? 'block' : 'none';
}

function currentSelection() {
  const [id, sheet] = document.getElementById('reportSelect').value.split('|||');
  return { id, sheet };
}

async function loadDashboard() {
  const { id, sheet } = currentSelection();
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  document.getElementById('kpiGrid').innerHTML = '<div class="loading">Loading live data…</div>';

  const summary = await api({ action: 'summary', id, sheet, from, to });

  renderKpis(summary);
  renderTrendChart(summary.trend);
  renderCategoryChart(summary.categoryCounts);
  await renderTable(id, sheet);
  document.getElementById('lastUpdated').textContent = 'Live • ' + new Date().toLocaleTimeString();
}

function renderKpis(summary) {
  let html = `
    <div class="kpi-card">
      <div class="label">Rows in range</div>
      <div class="value">${summary.rowCount}</div>
      <div class="sub">of ${summary.totalRowsAllTime} total</div>
    </div>`;
  Object.entries(summary.numericTotals || {}).forEach(([key, val]) => {
    html += `
    <div class="kpi-card">
      <div class="label">${key} (total)</div>
      <div class="value">${val}</div>
      <div class="sub">avg ${summary.numericAverages[key]}</div>
    </div>`;
  });
  document.getElementById('kpiGrid').innerHTML = html;
}

function renderTrendChart(trend) {
  const ctx = document.getElementById('trendChart');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: trend.map(t => t.date),
      datasets: [{ label: 'Rows per day', data: trend.map(t => t.count),
        borderColor: '#2c6e49', backgroundColor: 'rgba(44,110,73,0.15)', fill: true, tension: 0.3 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

function renderCategoryChart(categoryCounts) {
  const keys = Object.keys(categoryCounts || {});
  const ctx = document.getElementById('catChart');
  if (catChart) catChart.destroy();
  if (!keys.length) {
    document.getElementById('catChartTitle').textContent = 'No category columns detected';
    return;
  }
  const firstKey = keys[0];
  document.getElementById('catChartTitle').textContent = 'Breakdown: ' + firstKey;
  const data = categoryCounts[firstKey];
  catChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(d => d.label),
      datasets: [{ data: data.map(d => d.count), backgroundColor: COLORS }]
    },
    options: { responsive: true }
  });
}

async function renderTable(id, sheet) {
  const data = await api({ action: 'data', id, sheet });
  const headers = data.headers;
  const rows = data.rows.slice(-25);
  let html = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
  rows.forEach(r => {
    html += '<tr>' + r.map(c => `<td>${c ?? ''}</td>`).join('') + '</tr>';
  });
  document.getElementById('dataTable').innerHTML = html;
}

async function loadComparison() {
  const { id, sheet } = currentSelection();
  const p1From = document.getElementById('p1From').value;
  const p1To = document.getElementById('p1To').value;
  const p2From = document.getElementById('p2From').value;
  const p2To = document.getElementById('p2To').value;

  document.getElementById('compareKpis').innerHTML = '<div class="loading">Comparing…</div>';
  const cmp = await api({ action: 'compare', id, sheet, p1From, p1To, p2From, p2To });

  renderCompareKpis(cmp);
  renderCompareTrend(cmp.period1.trend, cmp.period2.trend);
  renderCompareCategories('p1Categories', cmp.period1.categoryCounts, 'p1');
  renderCompareCategories('p2Categories', cmp.period2.categoryCounts, 'p2');
}

function renderCompareKpis(cmp) {
  const rc = cmp.rowCountChange;
  let html = kpiChangeCard('Total rows', rc.period1, rc.period2, rc.delta, rc.pctChange);
  Object.entries(cmp.numericChange || {}).forEach(([key, v]) => {
    html += kpiChangeCard(key, v.period1, v.period2, v.delta, v.pctChange);
  });
  document.getElementById('compareKpis').innerHTML = html;
}

function kpiChangeCard(label, p1, p2, delta, pct) {
  const dir = pct >= 0 ? 'up' : 'down';
  const arrow = pct >= 0 ? '▲' : '▼';
  return `
    <div class="kpi-card">
      <div class="label">${label}</div>
      <div class="value">${p2}</div>
      <div class="sub">${p1} → ${p2}</div>
      <div class="sub ${dir}">${arrow} ${Math.abs(pct)}% (Δ${delta})</div>
    </div>`;
}

function renderCompareTrend(t1, t2) {
  const ctx = document.getElementById('compareTrendChart');
  if (compareTrendChart) compareTrendChart.destroy();
  const labels = [...new Set([...t1.map(t=>t.date), ...t2.map(t=>t.date)])].sort();
  compareTrendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Period 1', data: labels.map(l => (t1.find(t=>t.date===l)||{}).count || 0), borderColor: '#2a3b8f', backgroundColor:'rgba(42,59,143,.1)', tension:0.3 },
        { label: 'Period 2', data: labels.map(l => (t2.find(t=>t.date===l)||{}).count || 0), borderColor: '#a54f2e', backgroundColor:'rgba(165,79,46,.1)', tension:0.3 }
      ]
    },
    options: { responsive: true }
  });
}

function renderCompareCategories(elId, categoryCounts, cls) {
  const keys = Object.keys(categoryCounts || {});
  if (!keys.length) { document.getElementById(elId).innerHTML = '<p>No category data</p>'; return; }
  let html = '';
  keys.forEach(key => {
    html += `<h4>${key}</h4><table>`;
    categoryCounts[key].forEach(row => {
      html += `<tr><td>${row.label}</td><td>${row.count}</td></tr>`;
    });
    html += '</table>';
  });
  document.getElementById(elId).innerHTML = html;
}

init().catch(err => {
  document.getElementById('kpiGrid').innerHTML = `<div class="empty">⚠️ ${err.message}</div>`;
});
</script>
</body>
</html>
